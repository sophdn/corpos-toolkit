surface = "knowledge"
action = "parse_context"
purpose = "Canonical orienting call. Resolve every reference-shape token in a user message AND surface domain-conditional context (skills, memory entries, vault notes, kiwix hits, disciplines triggered by message shape) in one unified envelope. parse_context is the agent's first call on every user prompt (modulo the discernment skill's skip rules: short conversational acknowledgments, slash-commands, pure continuations). Replaces the prior pattern of per-shape direct calls (chain_find, task_search, vault_search, kiwix_search, the available-skills list, …) — one round-trip surfaces everything potentially relevant."
notes = "Shape coverage:\n\n  • chain_slug / task_slug / bug_slug → DB row in the corresponding table\n  • path → filesystem under RepoRoot (file or directory)\n  • skill_name → skills/<name>/ directories\n  • tool_name → action-manifests/*.toml basenames\n  • forge_schema → blueprints/forge-schemas/*.toml basenames\n  • project_name → KnownProjects catalog\n  • library_entry → library_index.slug or title\n  • domain_term → vault_search via Qwen rubric classifier\n  • external_technical → kiwix_search + (when wired) kiwix_bridge resolver\n  • friction_shape → bug-filing suggestion (supersedes the friction-filing-reminder Stop hook for in-message detection)\n  • skill_trigger → skills/_manifest.toml trigger keywords (T5 follow-on)\n  • memory_entry → MEMORY.md index entries (T5 follow-on)\n  • vault_candidate → vault_search bridge with domain-condition gate (T5 follow-on)\n  • kiwix_bridge → kiwix_search bridge for external-technical terms (T5 follow-on)\n  • discipline_skill → discipline-skill bodies whose trigger condition fires on the message (T5 follow-on)\n\nConfidence tier semantics (see docs/REFERENCE_RESOLUTION.md §4):\n\n  • single_exact → recommended_action=use_directly; PresentedAs is the canonical attribution string.\n  • fuzzy_multi → recommended_action=ask_user_to_disambiguate; PresentedAs enumerates the top candidates.\n  • weak_domain → recommended_action=mention_as_possibly_relevant; PresentedAs hedges with the top hit and score.\n  • no_hit → recommended_action=acknowledge_no_hit_and_ask; PresentedAs says the token didn't resolve.\n\nEach resolved reference carries a grounding_event_id. Every call emits one grounding_events row per detected reference with query_source='reference_resolution'.\n\nFilter cache: per-session, keyed by (session_id, token, shape) with per-resolver policies (see docs/PARSE_CONTEXT.md §3.3 + §4). The cache_hits and cache_misses fields on the response envelope distinguish cached re-calls from fresh resolution. T5 follow-on phase wires the cache; the shell exposes the envelope fields with zero values until then.\n\n`resolve_references` is a soft alias of `parse_context` — both dispatch into the same handler core, so existing callers continue to work without modification. New callers prefer parse_context.\n\nHistory: shipped as a back-compat-preserving alias by chain reference-resolution-migration T5 (Phase 1). Follow-on phases: cache layer, then per-resolver shape additions (skill_trigger, memory_entry, vault_candidate, kiwix_bridge, discipline_skill).\n"

[[params]]
  name = "message_text"
  type = "string"
  required = true
  description = "The user message (or any agent-facing text) to scan for unresolved references and domain-conditional context. Empty string returns an empty References list and zero resolver calls."

[[params]]
  name = "session_id"
  type = "optional_string"
  required = false
  description = "Session identifier for the filter-cache. Defaults to the span's trace ID when omitted (the substrate stamps it from the request context). Pass explicitly when calling outside an MCP session (smoke harness, scripts)."

[[params]]
  name = "top_k_per_shape"
  type = "integer"
  required = false
  description = "Cap on candidates each resolver returns after dispatcher post-processing. Defaults to 5."

[[params]]
  name = "include_no_hits"
  type = "bool"
  required = false
  description = "When true, references that resolved to no_hit stay in the References list (with recommended_action = acknowledge_no_hit_and_ask) instead of collapsing into the NoHitTokens slice. Default false."

[[params]]
  name = "total_budget_ms"
  type = "integer"
  required = false
  description = "Dispatcher wall-clock cap for the whole call, in milliseconds. Defaults to 2000 (2s) today; budget rises to 4000 (4s) when the broader resolver set lands. When the budget trips, truncated_by_budget=true is set on the response envelope; resolvers not reached surface ErrTotalBudgetExceeded as partial_failures."

[[params]]
  name = "cache_policy_override"
  type = "optional_string"
  required = false
  description = "Force a cache policy for this call. Accepted values: 'fresh' (skip cache lookup, write fresh; useful when callers know they want bypass), 'cache_only' (return cached hits only, no fresh resolution). Default unset — substrate uses per-resolver policy from the design's §3.3 matrix."

[[params]]
  name = "inline_skill_bodies"
  type = "bool"
  required = false
  description = "Chain 602. Per-request override of the TOOLKIT_PARSE_CONTEXT_INLINE_BODIES env var that gates skill-body inlining. When true (and a skill_trigger or discipline_skill ref resolves at single_exact), the envelope carries body_inlined / body_truncated / body_summary / body_bytes on the ref. Default unset → use env-var setting (default OFF during rollout). Pass false to force-disable for one call."

[[params]]
  name = "inline_budget_bytes"
  type = "integer"
  required = false
  description = "Chain 602. Overrides the default 20 KB envelope budget for inlined skill bodies. Zero or unset uses the default. The per-skill cap (8 KB) is not caller-tunable; raising the envelope budget is enough."

[[errors]]
  condition = "registry not configured"
  message = "Returned when the server started without the refresolve registry wired (degraded mode). Returns {error: 'registry not configured'} on the response envelope instead of a Go error."

[[examples]]
  description = "Basic call — orient on a shape-heavy user message."
  call = "{\"action\":\"parse_context\",\"params\":{\"message_text\":\"please finish T8 and T9 in reference-resolution-substrate; T7 is blocked\"}}"

[[examples]]
  description = "Tighter budget when calling parse_context on a latency-sensitive path."
  call = "{\"action\":\"parse_context\",\"params\":{\"message_text\":\"look up budget-trip\",\"total_budget_ms\":500}}"

[[examples]]
  description = "Force a fresh resolve, bypassing the session cache."
  call = "{\"action\":\"parse_context\",\"params\":{\"message_text\":\"recheck T8 status\",\"cache_policy_override\":\"fresh\"}}"
